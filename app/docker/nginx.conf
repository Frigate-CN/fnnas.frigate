worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 0;

    map $http_x_trim_isadmin $frigate_role {
        "true"  "admin";
        default "viewer";
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen unix:/var/run/fn-app/app.sock;

        location = /app/frigate {
            return 302 /app/frigate/;
        }

        location /app/frigate/ {
            rewrite ^/app/frigate/(.*) /$1 break;

            proxy_pass http://frigate:8971;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_set_header X-Forwarded-User $http_x_trim_username;
            proxy_set_header X-Forwarded-Groups $frigate_role;

            proxy_set_header X-Ingress-Path "/app/frigate";

            proxy_buffering off;
        }
    }
}
