worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 0;

    # 将飞牛网关的 X-Trim-Isadmin 映射�?Frigate 角色
    # "true" �?admin（管理员�? 其他 �?viewer（普通用户）
    map $http_x_trim_isadmin $frigate_role {
        "true"  "admin";
        default "viewer";
    }

    # WebSocket 连接升级支持（Frigate 实时画面需要）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        # 监听 Unix Socket �?飞牛网关通过�?Socket 转发请求
        # 注意：网关保�?gatewayPrefix，请求到达时路径�?/app/frigate/...
        listen unix:/var/run/fn-app/app.sock;

        # /app/frigate �?/app/frigate/
        location = /app/frigate {
            return 302 /app/frigate/;
        }

        # 剥离网关前缀后转发给 Frigate（Host 模式 �?127.0.0.1�?
        location /app/frigate/ {
            rewrite ^/app/frigate/(.*) /$1 break;

            proxy_pass http://127.0.0.1:8971;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # 将飞牛网关认�?Header 映射�?Frigate 兼容�?proxy 认证�?
            proxy_set_header X-Forwarded-User $http_x_trim_username;
            proxy_set_header X-Forwarded-Groups $frigate_role;

            # 告知 Frigate 前端正确�?base path，确�?API 请求路径正确
            proxy_set_header X-Ingress-Path "/app/frigate";

            # 禁用缓冲以支�?SSE 和流式传�?
            proxy_buffering off;
        }
    }
}
